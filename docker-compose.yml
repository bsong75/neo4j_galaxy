services:
  neo4j:
    image: neo4j:5
    container_name: neo4j_instance
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - TZ=America/New_York
      #- NEO4J_PLUGINS=["graph-data-science"]
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: cypher-shell -u neo4j -p password "RETURN 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - app-net

  elasticsearch:
    image: elasticsearch:8.17.0
    container_name: elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=changeme
      - TZ=America/New_York
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: curl -s -u elastic:changeme http://localhost:9200/_cluster/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-net

  flask_api:
    build: ./server
    container_name: flask_api
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=America/New_York
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - REACT_APP_URL=http://localhost:3005
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_USER=elastic
      - ELASTICSEARCH_PASSWORD=changeme
    depends_on:
      neo4j:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - app-net

  react_front:
    build: ./client
    container_name: react_front
    ports:
      - "3005:80"
    depends_on:
      - flask_api
    networks:
      - app-net

volumes:
  neo4j_data:
  es_data:

networks:
  app-net:
